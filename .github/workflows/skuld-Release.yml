name: '[SKULD] Build, Run, and Release'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag/version (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write   # needed so the workflow can create a release and upload assets

jobs:
  build-run-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./ExecTools/Skuld/Skuld.csproj

      - name: Build
        run: dotnet build ./ExecTools/Skuld/Skuld.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./ExecTools/Skuld/Skuld.csproj -c Release -r win-x86 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: First run -- expected to fail, just creates the default config
        working-directory: ./publish
        shell: bash
        run: ./Skuld.exe || true

      - name: Second run -- config now exists, app does the real work and produces the zip
        working-directory: ./publish
        shell: bash
        run: ./Skuld.exe

      - name: Locate the generated zip
        id: find_zip
        working-directory: ./publish
        shell: bash
        run: |
          ZIP_REL=$(find . -maxdepth 3 -iname "*.zip" | head -n 1)
          if [ -z "$ZIP_REL" ]; then
            echo "No zip file found!" >&2
            exit 1
          fi
          ZIP_REL=${ZIP_REL#./}
          echo "Found: publish/$ZIP_REL"
          echo "zip_path=publish/$ZIP_REL" >> "$GITHUB_OUTPUT"

      - name: Verify config file exists
        working-directory: ./publish
        shell: bash
        run: |
          if [ ! -f "skuldConf.json" ]; then
            echo "Config file not found!" >&2
            exit 1
          fi
          echo "✓ skuldConf.json found"

      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: SKULD_${{ inputs.version }}
          name: SKULD_${{ inputs.version }}
          body: |
            > ⚠️ **Critical:** Always back up your `System` folder before proceeding with the installation.
            
            For installation and usage instructions, see the [SKULD README](https://github.com/neeye0n/ROTools/blob/main/ExecTools/Skuld/README.md)

          files: |
            ${{ steps.find_zip.outputs.zip_path }}
            ./publish/Skuld.exe
            ./publish/skuldConf.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}